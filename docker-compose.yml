services:
  postgres-db:
    image: postgres:15
    container_name: postgres_db_ordem_servico
    ports: 
      - '5432:5432'
    networks:
      - my_network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ordemservico
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5  

  ordem-servico-api:
    container_name: ordemservico-api-docker
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports: 
      - '8080:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres-db;Port=5432;Database=ordemservico;Username=postgres;Password=postgres123
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - my_network

networks:
  my_network:
    driver: bridge